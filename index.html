<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바이비트(Bybit) OMNISCIENCE 레이더 v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: radial-gradient(circle at 90% 10%, #1a1405 0%, #0a0802 100%); 
            color: #cbd5e1; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .glass { 
            background: rgba(30, 20, 5, 0.45); 
            backdrop-filter: blur(12px); 
            border: 1px solid #3d2a0e; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .gainer-bg { background: linear-gradient(90deg, rgba(16, 185, 129, 0.1) 0%, transparent 100%); }
        .loser-bg { background: linear-gradient(90deg, rgba(239, 68, 68, 0.1) 0%, transparent 100%); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(245,158,11,0.3); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(245,158,11,0.6); }
        @keyframes neonPulseGainer { 0% { box-shadow: inset 0 0 0px rgba(16,185,129,0); } 50% { box-shadow: inset 0 0 15px rgba(16,185,129,0.5); border-color: rgba(16,185,129,0.8); } 100% { box-shadow: inset 0 0 0px rgba(16,185,129,0); } }
        @keyframes neonPulseLoser { 0% { box-shadow: inset 0 0 0px rgba(239,68,68,0); } 50% { box-shadow: inset 0 0 15px rgba(239,68,68,0.5); border-color: rgba(239,68,68,0.8); } 100% { box-shadow: inset 0 0 0px rgba(239,68,68,0); } }
        .blink-gainer { animation: neonPulseGainer 1.5s infinite; }
        .blink-loser { animation: neonPulseLoser 1.5s infinite; }
    </style>
</head>
<body class="p-4 lg:p-8">
    <div class="flex justify-between items-start mb-6 w-full">
        <div>
            <h1 class="text-3xl font-extrabold text-[#f59e0b] mb-2 drop-shadow-md">
                <i class="fas fa-satellite-dish"></i> OMNISCIENCE BYBIT RADAR 
                <span class="text-xs text-amber-300 font-normal ml-2 tracking-widest border border-amber-800 bg-amber-900/30 px-2 rounded">v3.0 C.O.T</span>
            </h1>
            <p class="text-gray-400">파이썬 AI 코어 연동망 및 실시간 고래 자금 추적 시스템</p>
        </div>
        <div class="flex items-center gap-4">
            <div id="live-clock" class="text-2xl font-mono font-black text-[#f59e0b] bg-black/60 px-5 py-2 rounded-xl border border-amber-900/50 shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                --:--:--
            </div>
        </div>
    </div>
    
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- 상승 Top 10 레이더 -->
        <div class="lg:col-span-4 glass p-4 rounded-xl flex flex-col h-[calc(100vh-120px)]">
            <h2 class="text-lg font-bold text-white mb-4 border-b border-gray-800 pb-2"><i class="fas fa-rocket text-green-500 mr-2"></i> 자금 쏠림 (Top 10)</h2>
            <div id="top-gainers" class="space-y-2 overflow-y-auto flex-grow custom-scrollbar"></div>
        </div>

        <!-- 하락 Top 10 레이더 -->
        <div class="lg:col-span-4 glass p-4 rounded-xl flex flex-col h-[calc(100vh-120px)]">
            <h2 class="text-lg font-bold text-white mb-4 border-b border-gray-800 pb-2"><i class="fas fa-meteor text-red-500 mr-2"></i> 기술적 반등 대기 (Drawdown 10)</h2>
            <div id="top-losers" class="space-y-2 overflow-y-auto flex-grow custom-scrollbar"></div>
        </div>
        
        <!-- 제갈량 통제소 -->
        <div class="lg:col-span-4 glass p-4 rounded-xl flex flex-col h-[calc(100vh-120px)] relative">
            <h2 class="text-lg font-bold text-white mb-4 border-b border-gray-800 pb-2 flex justify-between">
                <span><i class="fas fa-brain text-purple-400 mr-2"></i> 제갈량 OMNISCIENCE</span>
                <span class="text-xs text-green-400 flex items-center"><div class="w-2 h-2 bg-green-400 rounded-full animate-ping mr-2"></div> AI 링크 연결됨</span>
            </h2>
            
            <div id="leaders-list" class="space-y-2 mb-4 border-b border-gray-800 pb-4"></div>
            
            <!-- AI 브리핑 패널 -->
            <div class="bg-black/40 border border-purple-500/50 rounded-lg p-4 shadow-[0_0_15px_rgba(168,85,247,0.2)] flex-grow overflow-y-auto custom-scrollbar">
                <div class="text-[12px] text-purple-400 font-bold mb-3"><i class="fas fa-robot mr-1"></i> Chain_of_Thought 지능 브리핑</div>
                <div id="ai-verdict" class="text-[14px] text-gray-300 leading-relaxed whitespace-pre-wrap">AI 두뇌 응답 대기 중...</div>
            </div>
            
            <div class="mt-4 border-t border-gray-800 pt-3 text-[11px] text-gray-500 font-mono text-center" id="last-update">업데이트 대기</div>
        </div>
    </div>
    
    <script>
        function updateClock() {
            document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-GB');
        }
        setInterval(updateClock, 1000);

        function renderList(dataArr, elementId, mode) {
            const html = dataArr.map((t, i) => {
                const sym = t.symbol.replace('USDT', '');
                const chg = (parseFloat(t.price24hPcnt) * 100).toFixed(2);
                const fr = (parseFloat(t.fundingRate) * 100).toFixed(4);
                const vel = parseFloat(t.velocity1m).toFixed(2);
                const dd = parseFloat(t.drawdown).toFixed(1);
                
                const bgClass = mode === 'gainer' ? 'gainer-bg' : 'loser-bg';
                const colorClass = mode === 'gainer' ? 'text-green-400' : 'text-red-400';
                const sign = mode === 'gainer' ? '+' : '';
                
                return `
                    <div class="${bgClass} bg-black/40 p-3 rounded-lg border border-gray-800 hover:border-gray-600">
                        <div class="flex justify-between items-center mb-1">
                            <div class="font-bold text-white tracking-wide">${i+1}. ${sym}</div>
                            <div class="text-lg font-black ${colorClass}">${sign}${chg}%</div>
                        </div>
                        <div class="flex justify-between text-[11px] font-mono text-gray-400">
                            <span>FR: <span class="${fr < 0 ? 'text-red-400 font-bold' : ''}">${fr}%</span></span>
                            <span>Vel: ${vel}%</span>
                            <span>Peak: ${dd}%</span>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById(elementId).innerHTML = html;
        }

        async function fetchRadarData() {
            try {
                const res = await fetch('http://localhost:8089/api/market_data');
                const data = await res.json();
                
                if(data.gainers) renderList(data.gainers, 'top-gainers', 'gainer');
                if(data.losers) renderList(data.losers, 'top-losers', 'loser');
                
                if(data.leaders) {
                    const lHtml = data.leaders.map(t => {
                        const sym = t.symbol.replace('USDT', '');
                        const chg = (parseFloat(t.price24hPcnt) * 100).toFixed(2);
                        return `<div class="bg-yellow-900/10 p-2 rounded border border-yellow-800 flex justify-between"><span class="text-yellow-500 font-bold"><i class="fas fa-crown"></i> ${sym}</span> <span class="${chg>=0?'text-green-400':'text-red-400'} font-bold">${chg}%</span></div>`;
                    }).join('');
                    document.getElementById('leaders-list').innerHTML = lHtml;
                }
                
                if(data.verdicts) {
                    let vHtml = data.verdicts;
                    // Format XML thinking tags for visuals
                    vHtml = vHtml.replace(/<thinking>/g, '<div class="text-gray-500 text-[12px] italic border-l-2 border-purple-800 pl-2 mb-3 bg-black/30 p-2 rounded">🧠 Thought Process:\n').replace(/<\/thinking>/g, '</div>');
                    // Format Alert text
                    vHtml = vHtml.replace(/🚨|❌|⚠️/g, '<span class="text-red-500 text-lg">$&</span>');
                    
                    document.getElementById('ai-verdict').innerHTML = vHtml;
                }
                
                if(data.last_update) document.getElementById('last-update').innerText = "Last Update: " + data.last_update;
                
            } catch (err) {
                console.error("Backend fetch error:", err);
            }
        }

        setInterval(fetchRadarData, 2000);
        fetchRadarData();
    </script>
</body>
</html>

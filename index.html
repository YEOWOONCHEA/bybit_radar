<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNISCIENCE BYBIT RADAR v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #030712;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(168, 85, 247, 0.05), transparent 25%);
            color: #e2e8f0; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            min-height: 100vh;
        }
        .mono-num { font-family: 'JetBrains Mono', monospace; }
        
        /* Premium Glass Panel */
        .glass-panel { 
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            border-radius: 1.25rem;
        }
        
        /* Item Cards */
        .coin-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 0.75rem;
            transition: all 0.3s ease;
        }
        .coin-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .gainer-card { border-left: 3px solid #10b981; }
        .gainer-card:hover { box-shadow: 0 4px 20px rgba(16, 185, 129, 0.15); }
        
        .loser-card { border-left: 3px solid #f43f5e; }
        .loser-card:hover { box-shadow: 0 4px 20px rgba(244, 63, 94, 0.15); }

        /* Badges */
        .metric-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.375rem;
            padding: 0.125rem 0.375rem;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
        
        /* AI Pulse Effect */
        @keyframes ai-pulse {
            0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }
        .ai-active { animation: ai-pulse 2s infinite; }
        
        /* Gradient Text */
        .text-gradient {
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .text-gradient-gold {
            background: linear-gradient(to right, #fcd34d, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-4 lg:p-6 overflow-hidden">
    <!-- Header Area -->
    <header class="flex justify-between items-center mb-6 w-full">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <i class="fas fa-satellite-dish text-white text-xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-extrabold tracking-tight text-white m-0 flex items-center gap-3">
                    OMNISCIENCE <span class="text-gray-400 font-light text-xl">|</span> 
                    <span class="text-gradient">BYBIT RADAR</span>
                    <span class="text-[10px] font-bold tracking-widest border border-indigo-500/30 text-indigo-300 bg-indigo-500/10 px-2 py-0.5 rounded-full uppercase">v3.0 C.O.T</span>
                </h1>
                <p class="text-sm text-slate-400 mt-1 font-medium">파이썬 AI 코어 연동망 및 실시간 고래 자금 추적 시스템</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <!-- 사운드 토글 버튼 -->
            <button onclick="enableAudio()" id="btn-audio" class="p-3 bg-slate-800/80 hover:bg-slate-700 rounded-xl text-slate-400 border border-slate-700 transition-all active:scale-95 shadow-lg group">
                <i class="fas fa-volume-mute group-hover:text-white transition-colors" id="audio-icon"></i>
            </button>
            <div id="live-clock" class="text-xl font-bold font-mono tracking-widest text-slate-200 bg-slate-900/80 px-6 py-2.5 rounded-xl border border-slate-700 shadow-lg flex items-center gap-3">
                <i class="far fa-clock text-indigo-400"></i> <span id="clock-display">--:--:--</span>
            </div>
        </div>
    </header>
    
    <!-- Main Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 h-[calc(100vh-120px)]">
        
        <!-- 상승 Top 10 레이더 -->
        <div class="lg:col-span-4 glass-panel flex flex-col overflow-hidden">
            <div class="p-5 border-b border-white/5 bg-white/[0.02]">
                <h2 class="text-base font-bold text-white flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="p-1.5 rounded-lg bg-emerald-500/10 text-emerald-400"><i class="fas fa-rocket"></i></div>
                        자금 쏠림 <span class="text-slate-400 font-normal text-sm ml-1">(Top 10)</span>
                    </div>
                </h2>
            </div>
            <div id="top-gainers" class="p-3 space-y-2 overflow-y-auto flex-grow custom-scrollbar">
                <!-- Loading State -->
                <div class="flex flex-col items-center justify-center h-full text-slate-500">
                    <i class="fas fa-circle-notch fa-spin text-2xl mb-3"></i>
                    <p class="text-sm">위성 데이터 동기화 중...</p>
                </div>
            </div>
        </div>

        <!-- 하락 Top 10 레이더 (설거지) -->
        <div class="lg:col-span-4 glass-panel flex flex-col overflow-hidden">
            <div class="p-5 border-b border-white/5 bg-white/[0.02]">
                <h2 class="text-base font-bold text-white flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="p-1.5 rounded-lg bg-rose-500/10 text-rose-400"><i class="fas fa-meteor"></i></div>
                        기술적 반등 대기 <span class="text-slate-400 font-normal text-sm ml-1">(Drawdown 10)</span>
                    </div>
                </h2>
            </div>
            <div id="top-losers" class="p-3 space-y-2 overflow-y-auto flex-grow custom-scrollbar"></div>
        </div>
        
        <!-- 제갈량 통제소 -->
        <div class="lg:col-span-4 flex flex-col gap-6">
            <!-- 최고 대장주 패널 -->
            <div class="glass-panel p-5">
                <h2 class="text-sm font-bold text-slate-300 mb-4 flex items-center gap-2">
                    <i class="fas fa-crown text-amber-500"></i> 최고 대장 관제소
                </h2>
                <div id="leaders-list" class="space-y-3"></div>
            </div>

            <!-- 제갈량 AI 브리핑 패널 -->
            <div class="glass-panel flex-grow flex flex-col overflow-hidden relative">
                <!-- Glowing border top -->
                <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-purple-500/50 to-transparent"></div>
                
                <div class="p-5 border-b border-white/5 flex justify-between items-center bg-purple-900/10">
                    <h2 class="text-base font-bold text-white flex items-center gap-2">
                        <div class="w-8 h-8 rounded-lg bg-purple-500/20 text-purple-400 flex items-center justify-center border border-purple-500/30">
                            <i class="fas fa-brain"></i>
                        </div>
                        <span class="text-gradient">제갈량 OMNISCIENCE</span>
                    </h2>
                    <div class="flex items-center gap-2 text-xs font-semibold text-emerald-400 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20 shadow-[0_0_10px_rgba(16,185,129,0.2)]">
                        <div class="w-2 h-2 bg-emerald-400 rounded-full animate-ping mr-1"></div> 연결됨
                    </div>
                </div>
                
                <div class="p-5 flex-grow overflow-y-auto custom-scrollbar bg-slate-900/30">
                    <div id="ai-verdict" class="text-sm text-slate-300 leading-relaxed whitespace-pre-wrap font-medium">
                        <div class="flex flex-col items-center justify-center py-10 opacity-50">
                            <i class="fas fa-layer-group text-3xl mb-3 text-purple-400"></i>
                            <p>AI 사고 코어 스탠바이...</p>
                        </div>
                    </div>
                </div>
                
                <div class="p-3 border-t border-white/5 bg-black/20 text-[11px] text-slate-500 font-mono text-center flex justify-between items-center px-5">
                    <span id="last-update"><i class="fas fa-sync fa-spin mr-1"></i> Data Syncing...</span>
                    <span class="text-indigo-400/50">1004MAS NEURAL NET</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let audioEnabled = false;
        let lastVerdictText = "스나이퍼 타겟이 없습니다.";

        function enableAudio() {
            audioEnabled = true;
            const icon = document.getElementById('audio-icon');
            const btn = document.getElementById('btn-audio');
            if (icon) {
                icon.classList.remove('fa-volume-mute');
                icon.classList.add('fa-volume-up');
                icon.classList.add('text-emerald-400');
                btn.classList.add('border-emerald-500/30', 'bg-emerald-500/10');
            }
            playSound('test');
        }

        function playSound(type) {
            if(!audioEnabled) return;
            try {
                const Ctx = window.AudioContext || window.webkitAudioContext;
                if(!Ctx) return;
                const ctx = new Ctx();
                if(type === 'test') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
                    osc.start(); osc.stop(ctx.currentTime + 0.1);
                } else if(type === 'alert') {
                    [0, 0.2, 0.4].forEach(offset => {
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        o.connect(g); g.connect(ctx.destination);
                        o.type = 'sawtooth';
                        o.frequency.setValueAtTime(800, ctx.currentTime + offset);
                        o.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + offset + 0.1);
                        g.gain.setValueAtTime(0.3, ctx.currentTime + offset);
                        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + offset + 0.15);
                        o.start(ctx.currentTime + offset); o.stop(ctx.currentTime + offset + 0.15);
                    });
                }
            } catch(e) { console.log("Audio Error", e); }
        }

        function updateClock() {
            document.getElementById('clock-display').innerText = new Date().toLocaleTimeString('en-US', {hour12:false});
        }
        setInterval(updateClock, 1000);
        updateClock();

        function renderList(dataArr, elementId, mode) {
            const html = dataArr.map((t, i) => {
                const sym = t.symbol.replace('USDT', '');
                const chg = (parseFloat(t.price24hPcnt) * 100).toFixed(2);
                const fr = (parseFloat(t.fundingRate) * 100).toFixed(4);
                const vel = parseFloat(t.velocity1m).toFixed(2);
                const dd = parseFloat(t.drawdown).toFixed(1);
                
                const isGainer = mode === 'gainer';
                const cardClass = isGainer ? 'gainer-card' : 'loser-card';
                const textColor = isGainer ? 'text-emerald-400' : 'text-rose-400';
                const sign = chg > 0 ? '+' : '';
                
                return `
                    <div class="coin-card ${cardClass} p-3 flex flex-col relative overflow-hidden">
                        <div class="flex justify-between items-center mb-2">
                            <div class="flex items-center gap-3">
                                <div class="text-xs font-black text-slate-600 bg-slate-800 rounded px-1.5 py-0.5">${i+1}</div>
                                <div class="font-bold text-white text-[15px] tracking-wide">${sym}</div>
                            </div>
                            <div class="text-lg font-black mono-num tracking-tight ${textColor}">${sign}${chg}%</div>
                        </div>
                        <div class="flex justify-between font-mono">
                            <div class="metric-badge ${fr < 0 ? 'text-rose-300 border-rose-500/30 bg-rose-500/10' : 'text-slate-400'}">
                                <span>FR</span> ${fr}%
                            </div>
                            <div class="flex gap-2">
                                <div class="metric-badge text-indigo-300 border-indigo-500/20">
                                    <i class="fas fa-bolt text-indigo-400"></i> ${vel}%
                                </div>
                                <div class="metric-badge ${dd < -10 ? 'text-amber-400 border-amber-500/30 bg-amber-500/10' : 'text-slate-400'}">
                                    <i class="fas fa-mountain"></i> ${dd}%
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            document.getElementById(elementId).innerHTML = html;
        }

        async function fetchRadarData() {
            try {
                const res = await fetch('http://localhost:8089/api/market_data');
                const data = await res.json();
                
                if(data.gainers) renderList(data.gainers, 'top-gainers', 'gainer');
                if(data.losers) renderList(data.losers, 'top-losers', 'loser');
                
                if(data.leaders) {
                    const lHtml = data.leaders.map(t => {
                        const sym = t.symbol.replace('USDT', '');
                        const chg = (parseFloat(t.price24hPcnt) * 100).toFixed(2);
                        const isUp = chg >= 0;
                        return `
                            <div class="bg-gradient-to-r from-amber-500/10 to-transparent p-3 rounded-xl border border-amber-500/20 flex justify-between items-center group hover:bg-amber-500/20 transition-colors">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-amber-500/20 text-amber-500 flex items-center justify-center group-hover:scale-110 transition-transform"><i class="fas fa-gem"></i></div>
                                    <span class="text-amber-100 font-extrabold text-lg">${sym}</span>
                                </div>
                                <span class="mono-num text-xl font-black ${isUp ? 'text-emerald-400' : 'text-rose-400'} drop-shadow-md">
                                    ${isUp ? '+' : ''}${chg}%
                                </span>
                            </div>
                        `;
                    }).join('');
                    document.getElementById('leaders-list').innerHTML = lHtml;
                }
                
                if(data.verdicts) {
                    let vHtml = data.verdicts;
                    
                    if (vHtml !== lastVerdictText && !vHtml.includes("스나이퍼 타겟이 없습니다.")) {
                        playSound('alert');
                        document.querySelector('.glass-panel:nth-child(2)').classList.add('ai-active');
                        setTimeout(() => document.querySelector('.glass-panel:nth-child(2)').classList.remove('ai-active'), 4000);
                    }
                    lastVerdictText = vHtml;

                    // UI 렌더링 포맷팅 (정규식 대체)
                    vHtml = vHtml.replace(/<thinking>/g, `
                        <div class="relative bg-slate-800/50 rounded-xl p-4 mb-4 border border-purple-500/30 overflow-hidden group">
                            <div class="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-purple-400 to-indigo-600"></div>
                            <div class="flex items-center gap-2 mb-2 text-purple-300 text-xs font-bold uppercase tracking-widest">
                                <i class="fas fa-microchip"></i> AI Thought Process
                            </div>
                            <div class="text-[13px] text-slate-400 font-mono leading-relaxed opacity-80 group-hover:opacity-100 transition-opacity">
                    `).replace(/<\/thinking>/g, '</div></div>');
                    
                    // Highlight emojis & Warnings
                    vHtml = vHtml.replace(/(🚨|❌|⚠️)/g, '<span class="text-rose-500 text-lg mx-1 drop-shadow-md animate-pulse">$1</span>');
                    
                    document.getElementById('ai-verdict').innerHTML = vHtml;
                }
                
                if(data.last_update) {
                    document.getElementById('last-update').innerHTML = `마지막 동기화: ${data.last_update.split(' ')[1]}`;
                }
                
            } catch (err) {
                console.error("Backend fetch error:", err);
            }
        }

        setInterval(fetchRadarData, 2000);
        fetchRadarData();
    </script>
</body>
</html>

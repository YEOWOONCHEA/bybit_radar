<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바이비트(Bybit) 전술 레이더</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; color: #cbd5e1; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid #1e293b; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-extrabold text-[#f59e0b] mb-2"><i class="fas fa-chart-bar"></i> 1004MAS BYBIT RADAR</h1>
    <p class="text-gray-400 mb-8">글로벌 선물(Futures/Spot) 달러 풀 감시망</p>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="glass p-6 rounded-xl">
            <h2 class="text-xl font-bold text-white mb-4">현재 글로벌 1위 (Top USDT)</h2>
            <div class="flex justify-between items-center bg-black/50 p-4 rounded-lg">
                <span class="text-2xl font-bold text-white">BTCUSDT</span>
                <span class="text-2xl font-black text-green-500">+1.24%</span>
            </div>
            <p class="text-right text-sm text-gray-500 mt-2">거래대금 $1,340,920,011 돌파</p>
        </div>
        
        <div class="glass p-6 rounded-xl border-l-4 border-[#f59e0b]">
            <h2 class="text-lg font-bold text-white mb-2"><i class="fas fa-brain"></i> 제갈량 판결 (Verdicts)</h2>
            <p class="text-gray-300 text-sm leading-relaxed">
                "안정권 파동입니다. 외신에 특별한 악재 없는 메이저 자금의 점진적 우상향."
            </p>
        </div>
    </div>

    <div class="mt-8 text-center"><a href="https://www.1004mas.com" class="text-yellow-500 hover:text-white underline">포탈(Portal) 복귀</a></div>
</body>
</html>

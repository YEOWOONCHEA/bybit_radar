<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>바이비트(Bybit) 전술 레이더</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; color: #cbd5e1; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid #1e293b; }
    </style>
</head>
<body class="p-8">
    <h1 class="text-3xl font-extrabold text-[#f59e0b] mb-2"><i class="fas fa-chart-line"></i> 1004MAS BYBIT RADAR</h1>
    <p class="text-gray-400 mb-8">글로벌 가상자산 선물(Futures) 달러 자금 풀 실시간 감시망</p>
    
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
        <!-- 실시간 Top 5 레이더 -->
        <div class="lg:col-span-5 glass p-6 rounded-xl">
            <h2 class="text-xl font-bold text-white mb-4"><i class="fas fa-globe-americas text-[#f59e0b] animate-pulse mr-2"></i> 글로벌 자금 쏠림 (Top 5)</h2>
            <div id="top-gainers-list" class="space-y-3">
                <div class="text-gray-400 text-sm">바이비트 통신망과 연결 중...</div>
            </div>
        </div>
        
        <!-- 제갈량 판결 리스트 -->
        <div class="lg:col-span-7 glass p-6 rounded-xl relative">
            <h2 class="text-xl font-bold text-white mb-4 flex justify-between items-center">
                <div><i class="fas fa-brain text-purple-400 mr-2"></i> 제갈량 전술 통제합동소 (Bybit)</div>
                <div class="flex items-center text-xs text-green-400"><div class="w-2 h-2 bg-green-400 rounded-full animate-ping mr-2"></div> AI 위성 수신 중</div>
            </h2>
            <div id="ai-verdict-list" class="space-y-4">
                <div class="text-gray-400 text-sm">로컬 파이썬 봇의 시그널을 대기 중입니다...</div>
            </div>
        </div>
    </div>
    
    <div class="mt-8 text-center text-sm">
        <a href="https://www.1004mas.com" class="text-yellow-500 hover:text-white underline"><i class="fas fa-door-open mr-1"></i> 중앙 포탈로 복귀</a>
    </div>
    
    <!-- 1004MAS Bybit Real-time Engine -->
    <script>
        async function initBybitEngine() {
            fetchTopGainers();
            setInterval(fetchTopGainers, 2000); // 2초마다 갱신
            
            fetchAIVerdict();
            setInterval(fetchAIVerdict, 60000); // 1분마다 AI 데이터 갱신
        }

        async function fetchTopGainers() {
            try {
                // Bybit V5 API: 선물(Linear) 실시간 마켓 전체 조회
                const res = await fetch('https://api.bybit.com/v5/market/tickers?category=linear');
                const data = await res.json();
                
                // USDT 페어만 필터링
                let list = data.result.list.filter(t => t.symbol.endsWith('USDT'));
                
                // 등락률(price24hPcnt) 내림차순 정렬
                list.sort((a,b) => parseFloat(b.price24hPcnt) - parseFloat(a.price24hPcnt));
                const top5 = list.slice(0, 5);
                
                const listHTML = top5.map((t, index) => {
                    const sym = t.symbol;
                    const changeRate = (parseFloat(t.price24hPcnt) * 100).toFixed(2);
                    const turnoverMillions = Math.floor(parseFloat(t.turnover24h) / 1000000).toLocaleString();
                    
                    // 글로벌 표준 색상: 상승=초록, 하락=빨강
                    const colorClass = changeRate > 0 ? 'text-green-500' : 'text-red-500';
                    const sign = changeRate > 0 ? '+' : '';
                    
                    return `
                        <div class="flex justify-between items-center bg-black/40 p-3 rounded-lg border border-gray-800 hover:border-gray-600 transition-colors">
                            <div class="flex items-center gap-3">
                                <span class="text-gray-600 font-black text-lg w-4">${index + 1}</span>
                                <div>
                                    <div class="font-bold text-white">${sym} <span class="text-xs text-gray-500 ml-1 font-normal">PERP</span></div>
                                    <div class="text-xs text-gray-400 mt-0.5">거래대금 $${turnoverMillions}M</div>
                                </div>
                            </div>
                            <div class="text-xl font-black ${colorClass}">${sign}${changeRate}%</div>
                        </div>
                    `;
                }).join('');
                
                document.getElementById('top-gainers-list').innerHTML = listHTML;
            } catch (error) {
                console.error("Bybit Fetch Error:", error);
            }
        }
        
        let aiVerdictsCache = [];

        async function fetchAIVerdict() {
            try {
                // Bybit 전용 JSONBin ID
                const res = await fetch('https://api.jsonbin.io/v3/b/69d0701e856a682189f9f1f3?meta=false');
                const data = await res.json();
                
                if(Array.isArray(data)) {
                    aiVerdictsCache = data;
                    renderVerdicts();
                }
            } catch(e) {
                console.error("Verdict Fetch Error:", e);
            }
        }

        function renderVerdicts() {
            if(aiVerdictsCache.length === 0) return;
            
            const styles = {
                'red': 'border-red-500/40 bg-red-900/10',
                'green': 'border-green-500/40 bg-green-900/10',
                'yellow': 'border-yellow-500/40 bg-yellow-900/10'
            };
            
            const badges = {
                'red': '<span class="bg-red-500 text-white text-xs font-bold px-2 py-1 rounded shadow-lg shadow-red-500/30"><i class="fas fa-skull-crossbones mr-1"></i> 숏(Short) 타겟 / 관망</span>',
                'green': '<span class="bg-green-500 text-white text-xs font-bold px-2 py-1 rounded shadow-lg shadow-green-500/30"><i class="fas fa-bullseye mr-1"></i> 롱(Long) 타겟 승인</span>',
                'yellow': '<span class="bg-yellow-500 text-black text-xs font-bold px-2 py-1 rounded shadow-lg shadow-yellow-500/30"><i class="fas fa-bomb mr-1"></i> 청산 맵 주의구간</span>'
            };
            
            const html = aiVerdictsCache.map(v => {
                const style = styles[v.signal] || styles['yellow'];
                const badge = badges[v.signal] || badges['yellow'];
                
                return `
                    <div class="p-4 rounded-xl border ${style} backdrop-blur-sm relative overflow-hidden transition-all hover:scale-[1.01]">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="font-extrabold text-white text-lg">${v.coin_name}</h3>
                            ${badge}
                        </div>
                        <p class="text-sm text-gray-300 leading-relaxed whitespace-pre-line">${v.reason}</p>
                        <div class="text-right text-xs mt-3 text-gray-500"><i class="far fa-clock"></i> ${v.timestamp} (오더플로우 분석결과)</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('ai-verdict-list').innerHTML = html;
        }
        
        // Start Engine
        initBybitEngine();
    </script>
</body>
</html>
